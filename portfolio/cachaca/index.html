    :root {

    body {

      font-size: 15px;
      padding: 3rem 2rem 5rem;
      max-width: 680px;
      margin: 0 auto;
    }

    a { color: inherit; text-decoration: none; }

    .voltar {

      font-size: .8rem;

      margin-bottom: 2.5rem;

    }

      font-weight: 400;

    }

      padding: .15rem .6rem;
      color: var(--muted);
    }

    /* ── Área do sketch ── */
    #sketch-container {
      width: 100%;
      aspect-ratio: 1;
      background: #f5f5f5;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #sketch-container canvas {
      display: block;
    }

    /* ── Sobre o projeto ── */
    .sobre {
      border-top: 1px solid var(--border);
      padding-top: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sobre h2 {
      font-size: .72rem;
      font-weight: 300;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);

    .sobre p {

      line-height: 1.7;
      color: var(--text);

    footer {

      font-size: .72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
