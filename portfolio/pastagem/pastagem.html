<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degradação de pastagem — Amanda Borges</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Libre Baskerville', Times, serif;
      font-size: 12px;
      cursor: crosshair;
    }

    a { color: #000; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      padding: .5rem 1rem;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .hd-nome {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: .7rem;
      font-weight: 400;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .hd-volta {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: .6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #888;
    }

    .pagina {
      padding-top: 2.4rem;
      padding-bottom: 3rem;
      display: flex;
      flex-direction: column;
    }

    /* ── imagem full width ── */
    .bloco-img img {
      width: 100%;
      display: block;
    }

    /* ── duas imagens lado a lado ── */
    .bloco-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .bloco-2col .bloco-img img {
      height: 100%;
      object-fit: cover;
    }

    .bloco-legenda {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: .52rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #aaa;
      padding: .3rem 1rem;
      border-bottom: 1px solid #e8e8e8;
    }

    /* ── gif animado com fundo escuro ── */
    .bloco-gif {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bloco-gif img {
      width: 100%;
      max-width: 900px;
      display: block;
      margin: 0 auto;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      height: 2rem;
      border-top: 1px solid #e8e8e8;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      z-index: 100;
    }

    .ft-txt {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: .52rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb;
    }

    @media (max-width: 700px) {
      .bloco-2col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span class="hd-nome">Amanda Borges — portfólio</span>
  <a href="../index.html" class="hd-volta">← voltar</a>
</header>

<div class="pagina">

  <!-- GIF animado 2015–2020 -->
  <div class="bloco-gif">
    <img src="pastagem_anim.gif" alt="Animação degradação de pastagem 2015–2020">
  </div>
  <div class="bloco-legenda">animação · degradação de pastagem nos biomas cerrado e amazônia · 2015–2020</div>

  <!-- Mapa 2019 + Legenda lado a lado -->
  <div class="bloco-2col">
    <div class="bloco-img">
      <img src="pastagem_2019.png" alt="Mapa degradação de pastagem 2019">
    </div>
    <div class="bloco-img">
      <img src="pastagem_legenda.png" alt="Legenda — escala de degradação">
    </div>
  </div>
  <div class="bloco-legenda">mapa 2019 · escala de dispersão por célula de 10.500 ha · dados mapbiomas qualidade de pastagem</div>

</div>

<footer>
  <span class="ft-txt">Degradação de pastagem 2015–2020</span>
  <span class="ft-txt">QGIS · Python · MapBiomas · 2023</span>
</footer>

</body>
</html>
