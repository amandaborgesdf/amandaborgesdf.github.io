<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda Borges — sobre mim</title>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      font-family: 'Averia Serif Libre', serif;
    }

    .centro-wrapper {
      width: 320px;
      height: 320px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #vid {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    .voltar {
      position: fixed;
      top: 1.2rem; left: 1.5rem;
      color: rgba(67,67,67,.5);
      font-size: .8rem;
      text-decoration: none;
      z-index: 10;
    }

    .btn-som {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 1px solid rgba(67,67,67,.25);
      color: rgba(67,67,67,.6);
      font-family: 'Averia Serif Libre', serif;
      font-size: .8rem;
      padding: .4rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
    }

    .credito {
      position: fixed;
      bottom: 1.2rem; right: 1.5rem;
      color: rgba(67,67,67,.35);
      font-size: .7rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <a href="../index.html" class="voltar">← voltar</a>

  <div class="centro-wrapper">
    <video id="vid" autoplay muted loop playsinline>
      <source src="sobre.mp4" type="video/mp4">
    </video>
  </div>

  <button class="btn-som" id="btn-som" onclick="toggleSom()">ligar som</button>

  <p class="credito">Spike Jones — Tchaikovsky Medley</p>

  <script>
    const vid = document.getElementById('vid');
    const btn = document.getElementById('btn-som');

    function toggleSom() {
      vid.muted = !vid.muted;
      btn.textContent = vid.muted ? 'ligar som' : 'desligar som';
    }
  </script>
</body>
</html>
