<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda Borges — sobre mim</title>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 320px;
      height: 320px;
      object-fit: cover;
      display: block;
    }
    .voltar {
      position: fixed;
      top: 1.2rem; left: 1.5rem;
      color: rgba(67,67,67,.5);
      font-family: 'Averia Serif Libre', serif;
      font-size: .8rem;
      text-decoration: none;
      z-index: 10;
      transition: color .2s;
    }
    .voltar:hover { color: #434343; }
    .btn-som {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 1px solid rgba(67,67,67,.25);
      color: rgba(67,67,67,.6);
      font-family: 'Averia Serif Libre', serif;
      font-size: .75rem;
      font-weight: 300;
      padding: .35rem .9rem;
      border-radius: 2rem;
      cursor: pointer;
      z-index: 10;
      transition: border-color .2s, color .2s, opacity .4s;
      white-space: nowrap;
    }
    .btn-som:hover { border-color: #434343; color: #434343; }
    .btn-som.hidden { opacity: 0; pointer-events: none; }
    .credito {
      position: fixed;
      bottom: 2.2rem; right: 1.5rem;
      color: rgba(67,67,67,.35);
      font-family: 'Averia Serif Libre', serif;
      font-size: .7rem;
      font-style: italic;
      letter-spacing: .03em;
    }
  </style>
</head>
<body>

  <a href="../index.html" class="voltar">← voltar</a>

  <video id="vid" autoplay muted loop playsinline>
    <source src="sobre.mp4" type="video/mp4">
  </video>

  <button id="btn-ligar" class="btn-som" onclick="ligarSom()">não ta ouvindo?</button>
  <button id="btn-desligar" class="btn-som hidden" onclick="desligarSom()">desligar som</button>

  <p class="credito">Spike Jones — Tchaikovsky Medley</p>

  <script>
    const vid = document.getElementById('vid');
    const btnLigar = document.getElementById('btn-ligar');
    const btnDesligar = document.getElementById('btn-desligar');

    function ligarSom() {
      vid.muted = false;
      vid.play();
      btnLigar.classList.add('hidden');
      btnDesligar.classList.remove('hidden');
    }

    function desligarSom() {
      vid.muted = true;
      btnDesligar.classList.add('hidden');
      btnLigar.classList.remove('hidden');
    }
  </script>

</body>
</html>
