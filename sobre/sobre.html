<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda Borges — sobre mim</title>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      font-family: 'Averia Serif Libre', serif;
    }

    /* Container Central que segura o Texto e o Vídeo */
    .centro-wrapper {
      width: 320px;
      height: 320px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    /* Texto que fica escondido "atrás" */
    .texto-escondido {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #434343;
      font-size: 0.95rem;
      line-height: 1.5;
      z-index: 1; 
    }

    /* O Vídeo que desliza */
    #vid {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2; 
      transition: transform 1.5s cubic-bezier(0.65, 0, 0.35, 1);
      border-radius: 4px;
    }

    #vid.revelado {
      transform: translateY(120%);
      opacity: 0.8;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }

    .container-interativo {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .container-interativo p {
      color: rgba(67,67,67,.5);
      font-size: 1.2rem;
      letter-spacing: 0.05em;
    }

    .btn-acao {
      background: transparent;
      border: 1px solid rgba(67,67,67,.25);
      color: rgba(67,67,67,.6);
      font-family: 'Averia Serif Libre', serif;
      font-size: .8rem;
      padding: .4rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Estilo dos Emojis */
    .word-label {
      position: absolute;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      line-height: 1;
      user-select: none;
    }

    .voltar {
      position: fixed;
      top: 1.2rem; left: 1.5rem;
      color: rgba(67,67,67,.5);
      font-size: .8rem;
      text-decoration: none;
      z-index: 10;
    }

    .hidden { display: none; }

    .credito {
      position: fixed;
      bottom: 1.2rem; right: 1.5rem;
      color: rgba(67,67,67,.35);
      font-size: .7rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <a href="../index.html" class="voltar">← voltar</a>

  <div class="container-interativo">
    <p>O que vc sabe sobre mim?</p>
    <button id="btn-ligar" class="btn-acao" onclick="revelarTudo()">ligue o som e descubra</button>
    <button id="btn-desligar" class="btn-acao hidden" onclick="resetSom()">desligar som</button>
  </div>

  <div class="centro-wrapper">
    <div class="texto-escondido">
      <p><b>Designer & Pesquisadora</b></p><br>
      <p>Explorando as fronteiras entre dados, visualização e impacto emocional.</p><br>
      <p>Mestranda focada em processos criativos e linguagens visuais.</p>
    </div>

    <video id="vid" autoplay muted loop playsinline>
      <source src="sobre.mp4" type="video/mp4">
    </video>
  </div>

  <p class="credito">Spike Jones — Tchaikovsky Medley</p>

  <script>
    const vid = document.getElementById('vid');
    const btnLigar = document.getElementById('btn-ligar');
    const btnDesligar = document.getElementById('btn-desligar');
    
    // Lista apenas de Emojis agora
    const emojis = ["😂", "🤣", "✨", "💫", "🎨", "👾", "🌀", "🫧"];

    function revelarTudo() {
      vid.muted = false;
      btnLigar.classList.add('hidden');
      btnDesligar.classList.remove('hidden');
      vid.classList.add('revelado');

      atualizarBarreiraFisica();
      iniciarChuva();
    }

    function resetSom() {
      vid.muted = true;
      vid.classList.remove('revelado');
      btnDesligar.classList.add('hidden');
      btnLigar.classList.remove('hidden');
      atualizarBarreiraFisica();
    }

    function iniciarChuva() {
      let i = 0;
      const totalEmojis = 60; 
      const interval = setInterval(() => {
        const emojiSorteado = emojis[Math.floor(Math.random() * emojis.length)];
        cairEmoji(emojiSorteado);
        i++;
        if(i >= totalEmojis) clearInterval(interval);
      }, 70); // Chuva rápida
    }

    // --- Matter.js Setup ---
    const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;
    const engine = Engine.create();
    const render = Render.create({
      element: document.body,
      engine: engine,
      options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false,
        background: 'transparent'
      }
    });

    let videoObstacle;
    let ground, wallLeft, wallRight;

    function setupMundo() {
      ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, { isStatic: true });
      wallLeft = Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, { isStatic: true });
      wallRight = Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, { isStatic: true });
      
      videoObstacle = Bodies.rectangle(window.innerWidth/2, window.innerHeight/2, 320, 320, { 
        isStatic: true,
        chamfer: { radius: 10 } 
      });

      Composite.add(engine.world, [ground, wallLeft, wallRight, videoObstacle]);
    }

    function atualizarBarreiraFisica() {
      if(vid.classList.contains('revelado')) {
        // Remove a barreira do centro para os emojis caírem no texto
        Body.setPosition(videoObstacle, { x: window.innerWidth/2, y: window.innerHeight + 1000 });
      } else {
        Body.setPosition(videoObstacle, { x: window.innerWidth/2, y: window.innerHeight/2 });
      }
    }

    setupMundo();
    Runner.run(Runner.create(), engine);

    function cairEmoji(emoji) {
      const el = document.createElement('div');
      el.className = 'word-label';
      el.innerText = emoji;
      
      // Emojis maiores e mais vibrantes
      const randomSize = Math.floor(Math.random() * (60 - 30) + 30);
      el.style.fontSize = `${randomSize}px`;
      
      document.body.appendChild(el);

      const largura = el.offsetWidth;
      const altura = el.offsetHeight;
      const xPos = Math.random() * (window.innerWidth - largura) + largura/2;

      const corpo = Bodies.rectangle(xPos, -50, largura, altura, {
        restitution: 0.7, // Bem elástico
        friction: 0.05,
        angle: Math.random() * Math.PI
      });

      Composite.add(engine.world, corpo);

      (function update() {
        const { x, y } = corpo.position;
        el.style.left = `${x - largura/2}px`;
        el.style.top = `${y - altura/2}px`;
        el.style.transform = `rotate(${corpo.angle}rad)`;
        requestAnimationFrame(update);
      })();
    }

    window.addEventListener('resize', () => {
      render.canvas.width = window.innerWidth;
      render.canvas.height = window.innerHeight;
      Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight + 25 });
    });
  </script>
</body>
</html>
