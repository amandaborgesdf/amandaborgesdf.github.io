<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda Borges — blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #fff;
      color: #434343;
      font-family: 'Averia Serif Libre', serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .voltar {
      position: fixed;
      top: 1.2rem; left: 1.5rem;
      color: rgba(67,67,67,.5);
      font-size: .8rem;
      text-decoration: none;
      z-index: 100;
    }

    header {
      margin: 6rem 0 2rem 0;
      text-align: center;
      z-index: 10;
    }

    h1 { font-weight: 300; font-size: 2.2rem; letter-spacing: 0.05em; }

    .aviso-vazio {
      margin-top: 1rem;
      color: rgba(67,67,67,.35);
      font-style: italic;
      font-size: 0.9rem;
    }

    .ciclovia {
      position: relative;
      width: 100vw;
      height: 200px;
      margin-top: 20px;
    }

    .bike {
      position: absolute;
      font-size: 45px;
      bottom: 10px;
      left: -100px;
      user-select: none;
      opacity: 0.8;
      /* O TRUQUE ESTÁ AQUI: Inverte o emoji horizontalmente */
      display: inline-block;
      transform: scaleX(-1);
    }

    /* Ajustamos a animação para considerar a inversão sem bugar o movimento */
    .b1 {
      animation: pedalar 14s linear infinite;
      animation-delay: 0s;
    }

    .b2 {
      animation: pedalar 9s linear infinite;
      animation-delay: 5s;
      font-size: 32px;
      bottom: 30px; 
      opacity: 0.4;
    }

    .b3 {
      animation: pedalar 11s linear infinite;
      animation-delay: 8s;
      font-size: 40px;
      bottom: 5px;
    }

    @keyframes pedalar {
      0% {
        left: -100px;
        /* Mantém o espelhamento durante a animação */
        transform: scaleX(-1);
      }
      100% {
        left: 110vw;
        transform: scaleX(-1);
      }
    }

    .estrada {
      position: absolute;
      bottom: 12px;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(67,67,67,0.08), transparent);
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      color: rgba(67,67,67,.3);
    }
  </style>
</head>
<body>

  <a href="../index.html" class="voltar">← voltar</a>

  <header>
    <h1>blog</h1>
    <p class="aviso-vazio">...</p>
  </header>

  <div class="ciclovia">
    <div class="estrada"></div>
    <div class="bike b1">🚴🏻‍♀️</div>
    <div class="bike b2">🚴🏻‍♀️</div>
    <div class="bike b3">🚴🏻‍♀️</div>
  </div>

  <footer>
    <p>© 2026 Amanda Borges — Pesquisa em movimento</p>
  </footer>

</body>
</html>
