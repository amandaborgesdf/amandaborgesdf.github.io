<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda Borges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #434343;
      --muted: rgba(67,67,67,.45);
      --border: rgba(67,67,67,.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Averia Serif Libre', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .container {
      display: flex;
      align-items: flex-start;
      gap: 3.5rem;
      max-width: 700px;
      width: 100%;
    }

    /* ── Foto ── */
    .photo-col {
      flex-shrink: 0;
    }

    .photo-col img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      filter: grayscale(15%);
    }

    /* ── Texto ── */
    .text-col {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: .25rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -.01em;
      line-height: 1;
      color: var(--text);
    }

    .role {
      font-size: .85rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.5;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: .55rem;
      margin-top: .25rem;
    }

    nav a {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--text);
      text-decoration: none;
      text-transform: lowercase;
      letter-spacing: .01em;
      transition: opacity .15s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    nav a::before {
      content: '→';
      font-size: .8rem;
      color: var(--muted);
      transition: transform .15s;
    }

    nav a:hover { opacity: .6; }
    nav a:hover::before { transform: translateX(3px); }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      .container {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.8rem;
      }

      nav { align-items: center; }
      nav a::before { display: none; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="photo-col">
    <img src="media/other/18102334717840247.jpg" alt="Amanda Borges">
  </div>

  <div class="text-col">
    <h1>Amanda Borges da Fonseca</h1>
    <p class="role">criatividade · visualização de dados</p>

    <nav>
      <a href="#">sobre mim</a>
      <a href="#">portfólio</a>
      <a href="arquivo de fotos/index.html">arquivo de fotos</a>
      <a href="#">blog</a>
      <a href="#">contato</a>
    </nav>
  </div>
</div>

</body>
</html>
